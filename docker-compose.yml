services:
  api:
    build: packages/api
    image: anime-upscaling-api
    container_name: anime-upscaling-api
    env_file: .env
    environment:
      - API_PORT=${API_PORT:-4751}
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,graphics,video
    expose:
      - "${API_PORT:-4751}"
    volumes:
      - ${PROCESS_DIR}:${PROCESS_DIR}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, compute, utility, graphics, video]
    restart: unless-stopped

  app:
    build: packages/app
    image: anime-upscaling-app
    container_name: anime-upscaling-app
    env_file: .env
    environment:
      - PORT=${APP_PORT:-4750}
    ports:
      - "${APP_PORT:-4750}:${APP_PORT:-4750}"
    depends_on:
      - api
    restart: unless-stopped
