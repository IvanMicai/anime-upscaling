services:
  upscaler:
    build: .
    image: batch-video2x:latest
    volumes:
      - ./input:/input:ro
      - ./output:/output
    environment:
      HOST_UID: ${HOST_UID:-1000}
      HOST_GID: ${HOST_GID:-1000}
      PROCESSOR: ${PROCESSOR:-realesrgan}
      SCALE: ${SCALE:-4}
      MODEL: ${MODEL:-}
      CODEC: ${CODEC:-libx265}
      OUTPUT_EXT: ${OUTPUT_EXT:-mkv}
      PIX_FMT: ${PIX_FMT:-}
      BIT_RATE: ${BIT_RATE:-0}
      NOISE_LEVEL: ${NOISE_LEVEL:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      NUM_GPUS: ${NUM_GPUS:-0}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
