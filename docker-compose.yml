services:
  upscaler:
    build:
      context: .
      args:
        HOST_UID: ${HOST_UID:-1000}
        HOST_GID: ${HOST_GID:-1000}
    image: anime-upscaler:latest
    volumes:
      - ./input:/input:ro
      - ./output:/output
      - ./models:/opt/Real-ESRGAN/weights
    environment:
      MODEL: ${MODEL:-realesr-animevideov3}
      SCALE: ${SCALE:-4}
      TILE: ${TILE:-0}
      DENOISE: ${DENOISE:-1.0}
      NUM_PROC: ${NUM_PROC:-1}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
