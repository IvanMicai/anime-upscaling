services:
  api:
    image: ivanmicai/anime-upscaling-api:${IMAGE_TAG:-latest}
    container_name: anime-upscaling-api
    environment:
      - API_PORT=${API_PORT:-4751}
      - PROCESS_DIR=${PROCESS_DIR:-/mnt/SSD2/process}
      - GPU_COUNT=${GPU_COUNT:-2}
      - STREAMS_PER_GPU=${STREAMS_PER_GPU:-1}
      - FFMPEG_STREAMS=${FFMPEG_STREAMS:-1}
      - GPU_VENDOR=${GPU_VENDOR:-nvidia}
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,graphics,video
      - VK_ICD_FILENAMES=/usr/share/vulkan/icd.d/nvidia_icd.json
      - VK_DRIVER_FILES=/usr/share/vulkan/icd.d/nvidia_icd.json
      - AUTH_PASSWORD=${AUTH_PASSWORD:?Set AUTH_PASSWORD}
      - AUTH_SECRET=${AUTH_SECRET:?Set AUTH_SECRET}
    expose:
      - "${API_PORT:-4751}"
    volumes:
      - ${HOST_PROCESS_DIR:-/mnt/SSD2/process}:${PROCESS_DIR:-/mnt/SSD2/process}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, compute, utility, graphics, video]
    mem_limit: ${API_MEM_LIMIT:-16g}
    restart: unless-stopped

  app:
    image: ivanmicai/anime-upscaling-app:${IMAGE_TAG:-latest}
    container_name: anime-upscaling-app
    user: "0:0"
    environment:
      - PORT=${APP_PORT:-4750}
      - API_URL=http://api:${API_PORT:-4751}
      - PROCESS_DIR=${PROCESS_DIR:-/mnt/SSD2/process}
      - AUTH_PASSWORD=${AUTH_PASSWORD:?Set AUTH_PASSWORD}
      - AUTH_SECRET=${AUTH_SECRET:?Set AUTH_SECRET}
    ports:
      - "${APP_PORT:-4750}:${APP_PORT:-4750}"
    volumes:
      - ${HOST_PROCESS_DIR:-/mnt/SSD2/process}:${PROCESS_DIR:-/mnt/SSD2/process}:ro
    depends_on:
      - api
    mem_limit: ${APP_MEM_LIMIT:-1g}
    restart: unless-stopped
