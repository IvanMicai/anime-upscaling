version: 2
updates:
  # Go API module (go.mod lives in apps/api).
  - package-ecosystem: gomod
    directory: /apps/api
    schedule:
      interval: weekly
    commit-message:
      prefix: chore
    open-pull-requests-limit: 5

  # Next.js app (package.json + pnpm-lock.yaml live in apps/web, not root).
  - package-ecosystem: npm
    directory: /apps/web
    schedule:
      interval: weekly
    commit-message:
      prefix: chore
    open-pull-requests-limit: 5

  # Dockerfiles.
  - package-ecosystem: docker
    directory: /apps/api
    schedule:
      interval: weekly
    commit-message:
      prefix: chore
  - package-ecosystem: docker
    directory: /apps/web
    schedule:
      interval: weekly
    commit-message:
      prefix: chore

  # GitHub Actions used by the CI and release workflows.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
